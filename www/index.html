<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#080705">
    <title>المحقق - بوابتك للتحقيق</title>
    
    <!-- خط القاهرة + خط عربي فخيم للعناوين -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- 🌌 الخلفية (سيبنا المكان ده عشان تحط الصورة بتاعتك) -->
    <div class="cinematic-bg">
        <div class="vignette"></div>
        <canvas id="particles-canvas"></canvas>
    </div>

    <!-- 📱 تحذير قلب الشاشة -->
    <div id="rotate-warning">
        <div class="warning-content">
            <div class="rotate-icon">📱</div>
            <p class="rotate-text">اقلب الموبايل بالعرض<br><span>عشان تبدأ التحقيق يا فنان!</span></p>
        </div>
    </div>

    <!-- 👤 شاشة الولوج الرئيسية -->
    <div id="auth-screen" class="screen active">

        <div class="content-wrapper">
            <!-- الهيدر واللوجو -->
            <div class="title-wrapper">
                <h1 class="game-title">المُحَقِّق</h1>
                <div class="title-star"><span>🕮</span></div>
                <p class="game-subtitle">لكل جريمة.. خيوط تقود للحقيقة</p>
            </div>

            <!-- الكروت الثلاثة الأفقية بنفس ترتيب صورتك بالظبط -->
            <div id="auth-main-options" class="auth-buttons-row">
                
                <!-- 1. إنشاء حساب (على اليمين) -->
                <button class="auth-card-btn" onclick="showAuthForm('signup')">
                    <div class="auth-icon-box">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <span class="auth-card-title">إنشاء حساب</span>
                </button>

                <!-- 2. تسجيل دخول (في النص) -->
                <button class="auth-card-btn" onclick="showAuthForm('login')">
                    <div class="auth-icon-box">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                    <span class="auth-card-title">تسجيل دخول</span>
                </button>

                <!-- 3. دخول كـ ضيف (على الشمال) -->
                <button class="auth-card-btn" onclick="showAuthForm('guest')">
                    <div class="auth-icon-box">
                        <!-- أيقونة برنيطة المحقق/المخبر -->
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C9.24 2 7 4.24 7 7v1H4c-1.1 0-2 .9-2 2v1c0 .55.45 1 1 1h18c.55 0 1-.45 1-1v-1c0-1.1-.9-2-2-2h-3V7c0-2.76-2.24-5-5-5zm0 2c1.66 0 3 1.34 3 3v1H9V7c0-1.66 1.34-3 3-3zM3 16c0 2.21 4.03 4 9 4s9-1.79 9-4v2c0 2.21-4.03 4-9 4s-9-1.79-9-4v-2z"/>
                        </svg>
                    </div>
                    <span class="auth-card-title">دخول كـ ضيف</span>
                </button>

            </div>

            <!-- النوافذ المنبثقة للتسجيل (مخفية أوفلاين) -->
            <div id="form-guest" class="auth-sub-form glass-card">
                <div class="form-header"><h3>🕵️‍♂️ دخول كضيف</h3></div>
                <input type="text" id="guest-name-input" placeholder="اكتب اسم المحقق..." class="auth-input">
                <button class="btn-primary-gold" onclick="loginAsGuest()">ابدأ التحقيق</button>
                <button class="btn-cancel" onclick="backToAuthMain()">⬅ رجوع</button>
            </div>

            <div id="form-signup" class="auth-sub-form glass-card">
                <div class="form-header"><h3>🔑 إنشاء حساب</h3></div>
                <input type="text" id="signup-fullname" placeholder="الاسم بالكامل" class="auth-input">
                <input type="text" id="signup-username" placeholder="اسم المستخدم" class="auth-input">
                <input type="password" id="signup-pass" placeholder="كلمة المرور" class="auth-input">
                <button class="btn-primary-gold" onclick="handleServerRegister()">تسجيل الحساب</button>
                <button class="btn-cancel" onclick="backToAuthMain()">⬅ رجوع</button>
            </div>

            <div id="form-login" class="auth-sub-form glass-card">
                <div class="form-header"><h3>🔓 تسجيل الدخول</h3></div>
                <input type="text" id="login-username" placeholder="اسم المستخدم" class="auth-input">
                <input type="password" id="login-pass" placeholder="كلمة المرور" class="auth-input">
                <button class="btn-primary-gold" onclick="handleServerLogin()">دخول</button>
                <button class="btn-cancel" onclick="backToAuthMain()">⬅ رجوع</button>
            </div>

        </div>
    </div>

    <!-- باقي الشاشات مخفية مؤقتاً لحد ما نخلص الشاشة دي -->
    <div id="main-menu" class="screen hidden"></div>
    <div id="profile-sync-screen" class="screen hidden"></div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
